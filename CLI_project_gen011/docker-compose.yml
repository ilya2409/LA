services:
  log-analyzer:
    build: .
    container_name: log-analyzer-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - type: bind
        source: ./uploads
        target: /app/uploads
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"